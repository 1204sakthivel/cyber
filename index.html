<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Analyzer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px;
    border:none;
    background:#007BFF;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.bar{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:10px;
    margin-top:20px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    background:red;
    transition:0.4s;
}

#result{
    margin-top:15px;
    font-weight:bold;
    text-align:center;
}

#tips{
    margin-top:15px;
    line-height:1.7;
    color:#555;
}

.good{
    color:green;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h2>Password Strength Analyzer</h2>

<div class="input-box">
<input type="password" id="password" placeholder="Enter Password">
<button onclick="togglePassword()">Show</button>
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<p id="result">Strength: -</p>

<div id="tips"></div>

</div>

<script>

const password=document.getElementById("password");
const fill=document.getElementById("fill");
const result=document.getElementById("result");
const tips=document.getElementById("tips");

password.addEventListener("input",checkPassword);

function checkPassword(){

let pass=password.value;
let score=0;
let suggestion="";

if(pass.length>=8) score++;
if(/[A-Z]/.test(pass)) score++;
if(/[a-z]/.test(pass)) score++;
if(/[0-9]/.test(pass)) score++;
if(/[!@#$%^&*(),.?":{}|<>]/.test(pass)) score++;

switch(score){

case 0:
case 1:
result.innerHTML="Strength: Very Weak";
fill.style.width="20%";
fill.style.background="red";
break;

case 2:
result.innerHTML="Strength: Weak";
fill.style.width="40%";
fill.style.background="orange";
break;

case 3:
result.innerHTML="Strength: Medium";
fill.style.width="60%";
fill.style.background="gold";
break;

case 4:
result.innerHTML="Strength: Strong";
fill.style.width="80%";
fill.style.background="dodgerblue";
break;

case 5:
result.innerHTML="Strength: Very Strong";
fill.style.width="100%";
fill.style.background="green";
break;

}

if(pass.length<8)
suggestion+="• Password should contain at least 8 characters.<br>";

if(!/[A-Z]/.test(pass))
suggestion+="• Add at least one uppercase letter.<br>";

if(!/[a-z]/.test(pass))
suggestion+="• Add at least one lowercase letter.<br>";

if(!/[0-9]/.test(pass))
suggestion+="• Add at least one number.<br>";

if(!/[!@#$%^&*(),.?\":{}|<>]/.test(pass))
suggestion+="• Add at least one special character.<br>";

if(score==5)
suggestion="<span class='good'>✔ Excellent! Your password is very secure.</span>";

tips.innerHTML=suggestion;

}

function togglePassword(){

if(password.type==="password"){
password.type="text";
event.target.innerHTML="Hide";
}
else{
password.type="password";
event.target.innerHTML="Show";
}

}

</script>

</body>
</html>
